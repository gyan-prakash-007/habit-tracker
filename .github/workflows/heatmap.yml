- name: Generate grid
        run: python3 grid.py

      - name: Commit updated grid
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.png
          git diff --staged --quiet || git commit -m "Update habit grid"
          git push