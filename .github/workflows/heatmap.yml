name: Update habit heatmaps

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-heatmaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install matplotlib

      - name: Show habits.json
        run: cat habits.json

      - name: Generate grid
        run: python3 grid.py

      - name: Commit updated grid
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.png
          git diff --staged --quiet || git commit -m "Update habit grid"
          git pull --rebase origin main
          git push    